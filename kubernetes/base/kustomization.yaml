apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pageindex

resources:
  - ingestion-service/
  - parser-service/
  - cache-service/
  - api-gateway/

commonLabels:
  app.kubernetes.io/managed-by: kustomize

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=dev
      - LOG_LEVEL=info

secretGenerator:
  - name: external-secrets
    literals:
      - OPENAI_API_KEY=placeholder

vars:
  - name: NAMESPACE
    objref:
      kind: Namespace
      name: pageindex
    fieldref:
      fieldpath: metadata.name

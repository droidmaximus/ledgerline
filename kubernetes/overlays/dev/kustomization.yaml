apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pageindex

bases:
  - ../base

namePrefix: dev-

commonLabels:
  environment: development

commonAnnotations:
  description: "Development environment"

replicas:
  - name: ingestion-service
    count: 1
  - name: parser-service
    count: 1
  - name: cache-service
    count: 1
  - name: api-gateway
    count: 1

images:
  - name: ingestion-service
    newTag: dev-latest
  - name: parser-service
    newTag: dev-latest
  - name: cache-service
    newTag: dev-latest
  - name: api-gateway
    newTag: dev-latest

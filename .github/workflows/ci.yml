name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.21'
  PYTHON_VERSION: '3.11'
  AWS_REGION: us-east-1

jobs:
  # ==========================================
  # Lint Go Code
  # ==========================================
  lint-go:
    name: Lint Go Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint (Ingestion Service)
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: services/ingestion-service

      - name: golangci-lint (API Gateway)
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: services/api-gateway

  # ==========================================
  # Lint Python Code
  # ==========================================
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install ruff black

      - name: Ruff (Parser Service)
        run: |
          cd services/parser-service
          ruff check . || true

      - name: Ruff (Cache Service)
        run: |
          cd services/cache-service
          ruff check . || true

      - name: Black (Check formatting)
        run: |
          black --check services/parser-service/app || true
          black --check services/cache-service/app || true

  # ==========================================
  # Test Go Services
  # ==========================================
  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    needs: [lint-go]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test Ingestion Service
        run: |
          cd services/ingestion-service
          go test -v -race -coverprofile=coverage.out ./...

      - name: Test API Gateway
        run: |
          cd services/api-gateway
          go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./services/ingestion-service/coverage.out,./services/api-gateway/coverage.out
          flags: go

  # ==========================================
  # Test Python Services
  # ==========================================
  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (Parser Service)
        run: |
          cd services/parser-service
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Test Parser Service
        run: |
          cd services/parser-service
          pytest tests/ -v --cov=app --cov-report=xml || true

      - name: Install dependencies (Cache Service)
        run: |
          cd services/cache-service
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Test Cache Service
        run: |
          cd services/cache-service
          pytest tests/ -v --cov=app --cov-report=xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./services/parser-service/coverage.xml,./services/cache-service/coverage.xml
          flags: python

  # ==========================================
  # Build Docker Images
  # ==========================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-go, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - name: ingestion-service
            path: services/ingestion-service
          - name: parser-service
            path: services/parser-service
          - name: cache-service
            path: services/cache-service
          - name: api-gateway
            path: services/api-gateway
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/pageindex-${{ matrix.service.name }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Security Scan
  # ==========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ==========================================
  # Notification
  # ==========================================
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-images]
    if: failure()
    steps:
      - name: Send notification
        run: |
          echo "Build failed! Please check the logs."
          # Add Slack/Discord webhook here if needed
